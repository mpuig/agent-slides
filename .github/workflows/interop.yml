name: Interop Matrix

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * 1"

jobs:
  interop:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Set up Python
        run: uv python install 3.12
      - name: Sync dependencies
        run: uv sync --all-groups
      - name: Run interop matrix (if corpus exists)
        run: |
          if [ ! -d corpus ]; then
            echo "corpus directory not found; skipping interop matrix"
            exit 0
          fi
          uv run python scripts/interop_matrix.py corpus --out interop-report.json
      - name: Upload interop report
        uses: actions/upload-artifact@v4
        with:
          name: interop-report
          path: interop-report.json
          if-no-files-found: ignore
