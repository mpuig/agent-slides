name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Set up Python
        run: uv python install 3.12
      - name: Sync dependencies
        run: uv sync --all-groups
      - name: Check skill schema/capability drift
        run: uv run python scripts/sync_operation_schema.py --check
      - name: Lint
        run: uv run ruff check .
      - name: Type-check
        run: uv run ty check
      - name: Test
        run: uv run pytest
      - name: Benchmark smoke
        run: uv run python scripts/benchmark.py --runs 2 --slides 10 --max-mean-sec 3.0 --max-p95-sec 5.0
